<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site flow tool</title>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #555; margin-top: 0; }
  label { display: block; font-weight: 600; margin-top: 16px; margin-bottom: 4px; font-size: 14px; }
  input[type=text] { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 15px; border: 1px solid #bbb; border-radius: 6px; }
  button { margin-top: 18px; padding: 10px 18px; font-size: 15px; background: #1d6f52; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #155a41; }
  button:disabled { background: #999; cursor: default; }
  button.secondary { background: #eee; color: #222; margin-left: 8px; }
  button.secondary:hover { background: #ddd; }
  #status { margin-top: 14px; font-size: 14px; color: #555; }
  .error { color: #a12020; }
  .card { background: #f9f9f7; border-radius: 8px; padding: 14px 18px; margin-top: 20px; font-size: 14px; display: none; }
  .card b { display: inline-block; min-width: 150px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; display: none; }
  th, td { padding: 8px 14px; border-bottom: 1px solid #ddd; text-align: right; }
  td:first-child, th:first-child { text-align: left; }
  th { background: #f4f4f2; font-weight: 600; }
  tr.ratio-row td { font-weight: 600; background: #fafaf6; }
  #step2, #step3 { display: none; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<h1>Site flow tool</h1>
<p class="sub">Nearest NRFA station, FEH grid reference, and area-scaled flow percentiles for a site.</p>

<div id="step1">
  <label for="coords">Site coordinates</label>
  <input type="text" id="coords" placeholder="e.g. 50.9184, -1.8680">
  <button id="lookupBtn">Find nearest station</button>
  <div id="status1"></div>
</div>

<div class="card" id="stationCard"></div>

<div id="step2">
  <label for="siteArea">Site catchment area from FEH (km2)</label>
  <input type="text" id="siteArea" placeholder="e.g. 126.12">
  <div class="hint">Paste the easting/northing above into the FEH search box, right-click to delineate, and enter the Area figure shown.</div>

  <label for="percentiles">Percentiles to calculate</label>
  <input type="text" id="percentiles" value="95,70,50,10,1">
  <div class="hint">Comma-separated, e.g. 95,70,50,10,1</div>

  <button id="computeBtn">Calculate</button>
  <div id="status2"></div>
</div>

<table id="resultsTable"></table>

<script>
let currentStation = null;

document.getElementById("lookupBtn").addEventListener("click", async () => {
  const status = document.getElementById("status1");
  const btn = document.getElementById("lookupBtn");
  status.textContent = "";
  btn.disabled = true;

  try {
    const res = await fetch("/api/lookup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ coords: document.getElementById("coords").value })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Lookup failed.");

    currentStation = data;
    const s = data.station;
    document.getElementById("stationCard").style.display = "block";
    document.getElementById("stationCard").innerHTML = `
      <div><b>Nearest station:</b> ${s.name} (${s.river || "-"}), ${s.distance_km} km away
      &mdash; <a href="${s.url}" target="_blank">station ${s.id}</a></div>
      <div><b>Station catchment area:</b> ${s.catchment_area} km2</div>
      <div><b>FEH grid reference:</b> ${data.easting} ${data.northing}</div>
    `;
    document.getElementById("step2").style.display = "block";
    status.textContent = "";
  } catch (err) {
    status.innerHTML = `<span class="error">${err.message}</span>`;
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("computeBtn").addEventListener("click", async () => {
  const status = document.getElementById("status2");
  const btn = document.getElementById("computeBtn");
  status.textContent = "";
  btn.disabled = true;

  try {
    if (!currentStation) throw new Error("Run 'Find nearest station' first.");
    const siteArea = document.getElementById("siteArea").value;
    const percentiles = document.getElementById("percentiles").value
      .split(",").map(s => s.trim()).filter(Boolean);

    const res = await fetch("/api/compute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        station_id: currentStation.station.id,
        station_area: currentStation.station.catchment_area,
        site_area: siteArea,
        percentiles: percentiles
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Calculation failed.");

    const table = document.getElementById("resultsTable");
    let html = `<tr><th></th><th>${currentStation.station.name}</th><th>Site (scaled)</th></tr>`;
    html += `<tr><td>Catchment area (km2)</td><td>${currentStation.station.catchment_area}</td><td>${siteArea}</td></tr>`;
    html += `<tr><td>Mean flow (m3/s)</td><td>${data.mean_station}</td><td>${data.mean_site}</td></tr>`;
    html += `<tr class="ratio-row"><td>Ratio</td><td>100%</td><td>${data.ratio_pct}%</td></tr>`;
    for (const row of data.rows) {
      html += `<tr><td>${row.label}</td><td>${row.station}</td><td>${row.site}</td></tr>`;
    }
    table.innerHTML = html;
    table.style.display = "table";
    status.textContent = "";
  } catch (err) {
    status.innerHTML = `<span class="error">${err.message}</span>`;
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
